openapi: 3.0.1
info:
  title: Book API
  version: 1.0.0
paths:
  /book/{id}:
    delete:
      tags:
        - Book
      operationId: delete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        204:
          description: Book was deleted
  /book:
    post:
      tags:
        - Book
      operationId: create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../models/book.yaml#/components/schemas/BookRequest'
      responses:
        200:
          description: Model was created
          content:
            application/json:
              schema:
                $ref: '../models/book.yaml#/components/schemas/Book'
