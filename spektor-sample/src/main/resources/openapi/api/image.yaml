openapi: 3.1.0
info:
  title: Image API
  version: 1.0.0
paths:
  /images:
    post:
      tags:
        - Image
      operationId: uploadImage
      requestBody:
        required: true
        content:
          image/*: { }
      responses:
        200:
          description: Uploaded image info
          content:
            application/json:
              schema:
                $ref: '../models/uploadedFile.yaml#/components/schemas/UploadedFile'
  /images/any:
    post:
      tags:
        - Image
      operationId: uploadAny
      requestBody:
        required: true
        content:
          '*/*': { }
      responses:
        200:
          description: Uploaded file info
          content:
            application/json:
              schema:
                $ref: '../models/uploadedFile.yaml#/components/schemas/UploadedFile'
