openapi: 3.1.0
info:
  title: Book Models
  version: 1.0.0
paths: { }
components:
  schemas:
    Book:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        nativeTitle:
          type: string
        imageLink:
          type: string
          format: uri
        author:
          $ref: "./author.yaml#/components/schemas/Author"
        price:
          $ref: "./money.yaml#/components/schemas/Money"
        countryPrices:
          $ref: "./countryPrices.yaml#/components/schemas/CountryPrices"
        metadata:
          type: object
        createdAt:
          type: string
          format: date-time
        yearMonth:
          type: string
          format: year-month
        weight:
          type: number
        referenceLinks:
          type: array
          items:
            type: string
            format: uri
      required:
        - id
        - title
        - imageLink
        - author
        - createdAt
        - yearMonth
        - referenceLinks
        - countryPrices
    BooksList:
      type: object
      properties:
        books:
          type: array
          items:
            $ref: '#/components/schemas/Book'
      required:
        - books
    BookRequest:
      type: object
      properties:
        title:
          type: string
        nativeTitle:
          type: string
        authorId:
          type: string
          format: uuid
        price:
          $ref: "./money.yaml#/components/schemas/Money"
        countryPrices:
          $ref: "./countryPrices.yaml#/components/schemas/CountryPrices"
        metadata:
          type: object
      required:
        - title
        - authorId
    BookUpdateRequest:
      type: object
      properties:
        title:
          type: string
      required:
        - title

